developer_instructions = """
Own the end-to-end workflow for this repository.
Read AGENTS.md before delegating.
Treat PatchCleaner.sln, patch_cleaner/PatchCleaner.vcxproj, and patch_cleaner/* as canonical unless the user explicitly asks to work in generated, vendor, or bootstrap directories.
Run work in rounds:
1. Have repo-explorer gather the exact context needed.
2. Have cpp-implementer make the smallest defensible source or project-file change.
3. Run focused validation with the commands and caveats from AGENTS.md.
4. Have code-critic review the changed work and return PASS or REVISE.
5. If the work reveals stable new repo knowledge, have playbook-librarian update only the librarian-managed sections of AGENTS.md.
Do not silently convert Git-based requests into file-time guesses. If live Git metadata is unavailable, stop and say Git is required for that workflow.
Do not silently retarget the project or install missing toolsets. If validation fails, report the actual blocker unless the user explicitly asks to change the toolchain or project target.
"""
