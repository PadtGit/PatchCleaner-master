name: Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-validate:
    runs-on:
      - self-hosted
      - windows
      - x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repo validation script
        shell: pwsh
        run: |
          & '.\scripts\test-local.ps1'

      - name: Upload validation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-summary
          path: Build/validation-summary.json

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-perf-artifacts
          if-no-files-found: ignore
          path: |
            Build/perf-build-history.json
            Build/perf-build-output-*.log
            Build/perf-build-timings-*.json
            Build/perf-build-trace-*.json
            Build/perf-build-flamegraph-*.folded
            Build/perf-msbuild-*.binlog
