name: Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-validate:
    runs-on:
      - self-hosted
      - windows
      - x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repo validation script
        shell: pwsh
        run: |
          & '.\scripts\test-local.ps1'

      - name: Upload validation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-summary
          path: Build/validation-summary.json
